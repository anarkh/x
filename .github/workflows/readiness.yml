name: Readiness checks

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  readiness:
    name: readiness / npm run check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Run readiness checks
        run: npm run check
